limit_req_zone $binary_remote_addr zone=chat_limit:1m rate=3r/m;
limit_req_zone $binary_remote_addr zone=research_limit:1m rate=2r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 64k;

    location = /api/chat {
        limit_req zone=chat_limit burst=2 nodelay;
        proxy_pass http://paper-api:8765/api/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store" always;
    }

    location ~ ^/api/(backtest/run|portfolio/run|walk-forward)$ {
        limit_req zone=research_limit burst=1 nodelay;
        proxy_pass http://paper-api:8765$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 40s;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        proxy_pass http://paper-api:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 40s;
        add_header Cache-Control "no-store" always;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
