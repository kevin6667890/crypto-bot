services:
  crypto-bot:
    build: .
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./data_cache:/app/data_cache
    restart: unless-stopped

  dashboard:
    profiles:
      - legacy-dashboard
    build: .
    env_file: .env
    environment:
      PAPER_API_INTERNAL_URL: http://paper-api:8765
      PAPER_API_URL: ${PAPER_API_URL:-}
    command: streamlit run dashboard/streamlit_app.py
    ports:
      - "8502:8501"
    volumes:
      - ./logs:/app/logs
      - ./data_cache:/app/data_cache
    restart: unless-stopped

  paper-api:
    build: .
    env_file: .env
    command: python -m dashboard.paper_api
    environment:
      PAPER_API_HOST: 0.0.0.0
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      MICROSTRUCTURE_DB_PATH: /app/data_cache/market_microstructure.db
    volumes:
      - ./data_cache:/app/data_cache
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8765/api/paper/flow/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  microstructure-collector:
    build: .
    command: python -m dashboard.microstructure_collector
    environment:
      MICROSTRUCTURE_DB_PATH: /app/data_cache/market_microstructure.db
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data_cache:/app/data_cache
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8770/health', timeout=12)"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:80"
    depends_on:
      - paper-api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
