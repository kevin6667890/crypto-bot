services:
  crypto-bot:
    build: .
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./data_cache:/app/data_cache
    restart: unless-stopped

  dashboard:
    build: .
    env_file: .env
    environment:
      PAPER_API_INTERNAL_URL: http://paper-api:8765
      PAPER_API_URL: ${PAPER_API_URL:-}
    command: streamlit run dashboard/streamlit_app.py
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./data_cache:/app/data_cache
    restart: unless-stopped

  paper-api:
    build: .
    env_file: .env
    command: python dashboard/paper_api.py
    environment:
      PAPER_API_HOST: 0.0.0.0
    ports:
      - "8765:8765"
    volumes:
      - ./data_cache:/app/data_cache
    restart: unless-stopped
